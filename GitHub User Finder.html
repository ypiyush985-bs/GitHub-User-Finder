<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Finder</title>
    <link rel="stylesheet" href="GitHub User Finder.css">
</head>
<body>
    <div class="container">
        <h1>GitHub User Finder</h1>
        
        <div class="search-box">
            <input type="text" id="usernameInput" placeholder="Enter GitHub username..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>

        <div id="error-message" class="hidden">User not found! Please check the spelling.</div>

        <div id="profileCard" class="card hidden">
            <img id="avatar" src="" alt="Profile Photo">
            <h2 id="name"></h2>
            <p id="username"></p>
            <p id="bio"></p>
            
            <div class="stats">
                <div class="stat-box">
                    <span id="followers">0</span>
                    <p>Followers</p>
                </div>
                <div class="stat-box">
                    <span id="following">0</span>
                    <p>Following</p>
                </div>
            </div>
            
            <a id="profileLink" href="" target="_blank" class="profile-btn">View GitHub Profile</a>
        </div>
    </div>

    <script src="GitHub User Finder.js"></script>
</body>
</html>
